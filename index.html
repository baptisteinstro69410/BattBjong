<!doctype html>
<html lang="fr">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Test iOS</title>

<button id="btn" style="font-size:20px;padding:20px">
  Tester caméra
</button>

<video id="v" autoplay playsinline style="width:100%;height:60vh"></video>

<script>
document.getElementById("btn").onclick = async () => {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    document.getElementById("v").srcObject = s;
    alert("✅ caméra OK");
  } catch (e) {
    alert("❌ caméra BLOQUÉE\n" + e.name);
    console.error(e);
  }
};
</script>
</html>
