<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BJONG Scan – Code 128</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
body{margin:0;font-family:-apple-system;background:#0b1220;color:#e8eefc;padding:14px}
button{padding:12px 16px;font-size:16px;border-radius:10px;border:none}
#reader video{width:100%;border-radius:12px}
</style>
</head>
<body>
<h2>BJONG Scan – Code 128 uniquement</h2>
<input type="file" id="file" accept=".xlsx"><br><br>
<button id="start">Démarrer le scan</button>
<button id="stop" disabled>Stop</button>
<div id="reader"><video id="video" playsinline muted autoplay></video></div>
<pre id="out"></pre>

<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let db=new Map(), controls=null;
const out=t=>document.getElementById('out').textContent=t;
const norm=v=>String(v||'').trim().toUpperCase();

file.onchange=async e=>{
 const buf=await e.target.files[0].arrayBuffer();
 const wb=XLSX.read(buf,{type:'array'});
 const ws=wb.Sheets[wb.SheetNames[0]];
 XLSX.utils.sheet_to_json(ws,{header:1}).slice(1).forEach(r=>{
  if(r[0]) db.set(norm(r[0]), r[2]);
  if(r[1]) db.set(norm(r[1]), r[2]);
 });
 out('Base chargée');
};

start.onclick=async()=>{
 if(controls) try{controls.stop()}catch(e){}
 const devices=await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
 const id=devices.at(-1)?.deviceId;
 const hints=new Map();
 hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS,[ZXingBrowser.BarcodeFormat.CODE_128]);
 const reader=new ZXingBrowser.BrowserMultiFormatReader(hints);
 stop.disabled=false; start.disabled=true;
 controls=await reader.decodeFromVideoDevice(id, video,(res,err,ctrl)=>{
  if(res){
   const k=norm(res.text||res.getText());
   const d=db.get(k)||db.get('V'+k)||db.get(k.replace(/^V/,''));
   out(d?`${k} → ${d}`:`${k} → NON TROUVÉ`);
   ctrl.stop(); controls=null;
   start.disabled=false; stop.disabled=true;
  }
 });
};

stop.onclick=()=>{ if(controls){controls.stop();controls=null;} start.disabled=false; stop.disabled=true; }
</script>
</body>
</html>
